<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умная Библиотека</title>
    <!-- MOVED HERE: Load epub.js library in head -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            animation: slideUp 0.5s ease-out;
        }

        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: #6c757d;
        }

        .secondary-btn:hover {
            background: #5a6268;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease-in 0.1s both;
        }

        .book-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .book-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .book-author {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .book-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #666;
        }

        .book-genre {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            width: fit-content;
        }

        .book-year {
            color: #999;
        }

        .book-rating {
            color: #ffc107;
            font-weight: bold;
        }

        .book-description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 10px 0;
            flex-grow: 1;
        }

        .book-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .book-actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.9rem;
        }

        .delete-btn {
            background: #dc3545;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .results-info {
            color: white;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .no-results {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #666;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .add-book-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .add-book-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }

            .control-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Умная Библиотека</h1>
            <p class="subtitle">Управление, поиск и фильтрация книг</p>
        </header>

        <!-- Секция добавления новой книги -->
        <div class="add-book-section">
            <h2>➕ Добавить новую книгу</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="newTitle">Название</label>
                    <input type="text" id="newTitle" placeholder="Название книги">
                </div>
                <div class="form-group">
                    <label for="newAuthor">Автор</label>
                    <input type="text" id="newAuthor" placeholder="Имя автора">
                </div>
                <div class="form-group">
                    <label for="newGenre">Жанр</label>
                    <input type="text" id="newGenre" placeholder="Жанр">
                </div>
                <div class="form-group">
                    <label for="newYear">Год издания</label>
                    <input type="text" id="newYear" placeholder="2024" max="2100">
                </div>
                <div class="form-group">
                    <label for="newRating">Рейтинг</label>
                    <input type="text" id="newRating" placeholder="4.5" max="5">
                </div>
                <div class="form-group">
                    <label for="newDescription">Описание</label>
                    <input type="text" id="newDescription" placeholder="Описание книги">
                </div>
            </div>
            <button onclick="addNewBook()">Добавить книгу</button>
        </div>

        <!-- Контролы поиска и фильтрации -->
        <div class="controls">
            <div class="control-group">
                <div>
                    <label for="searchInput">🔍 Поиск по названию, автору или описанию</label>
                    <input type="text" id="searchInput" placeholder="Введите запрос для поиска..." onkeyup="updateDisplay()">
                </div>
                <div>
                    <label for="genreFilter">🎭 Фильтр по жанру</label>
                    <select id="genreFilter" onchange="updateDisplay()">
                        <option value="">Все жанры</option>
                    </select>
                </div>
                <div>
                    <label for="ratingFilter">⭐ Минимальный рейтинг</label>
                    <select id="ratingFilter" onchange="updateDisplay()">
                        <option value="0">Все рейтинги</option>
                        <option value="4">4.0+</option>
                        <option value="4.5">4.5+</option>
                        <option value="4.7">4.7+</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <div>
                    <label for="sortBy">📊 Сортировка</label>
                    <select id="sortBy" onchange="updateDisplay()">
                        <option value="rating">По рейтингу (убывание)</option>
                        <option value="title">По названию (А-Я)</option>
                        <option value="year">По году (новые первыми)</option>
                        <option value="author">По автору (А-Я)</option>
                    </select>
                </div>
            </div>

            <div class="buttons">
                <button onclick="displayAllBooks()">Показать все книги</button>
                <button class="secondary-btn" onclick="clearFilters()">Очистить фильтры</button>
            </div>

            <!-- Статистика -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalBooks">0</div>
                    <div class="stat-label">Всего книг</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalGenres">0</div>
                    <div class="stat-label">Жанров</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="averageRating">0</div>
                    <div class="stat-label">Средний рейтинг</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="resultsCount">0</div>
                    <div class="stat-label">Результатов поиска</div>
                </div>
            </div>
        </div>

        <!-- Результаты поиска -->
        <div id="resultsInfo" class="results-info"></div>
        <div id="booksContainer" class="books-grid"></div>
    </div>

    <script>
        class SmartLibrary {
            constructor() {
                this.books = [];
                this.bookId = 1;
                this.initializeBooks();
            }

            async initializeBooks() {
                try {
                    const response = await fetch('js/books_data.json?v=' + Date.now());
                    if (!response.ok) throw new Error("JSON не найден");
                    const externalBooks = await response.json();
                    this.books = externalBooks.map(book => ({
                        id: this.bookId++,
                        title: book.title || "Без названия",
                        author: book.author || "Неизвестен",
                        genre: book.genre || "Классика",
                        year: book.year || 2024,
                        rating: book.rating || 5.0,
                        description: book.description || "Книга из библиотеки",
                        link: book.link,   
                        image: book.image  
                    }));
                    populateGenreFilter();
                    updateStatistics(); 
                    displayAllBooks(); 
                } catch (error) {
                    console.error("Ошибка загрузки:", error);
                }
            }

            addBook(title, author, genre, year, rating, description) {
                this.books.push({ id: this.bookId++, title, author, genre, year, rating, description });
                return true;
            }
            getAllBooks() { return [...this.books]; }
            getGenres() { return Array.from(new Set(this.books.map(b => b.genre))).sort(); }
            sortByRating() { return [...this.books].sort((a, b) => b.rating - a.rating); }
            sortByYear() { return [...this.books].sort((a, b) => b.year - a.year); }
            sortByTitle() { return [...this.books].sort((a, b) => a.title.localeCompare(b.title)); }
            sortByAuthor() { return [...this.books].sort((a, b) => a.author.localeCompare(b.author)); }
            removeBook(id) { 
                const idx = this.books.findIndex(b => b.id === id);
                if (idx !== -1) this.books.splice(idx, 1);
            }
            getStatistics() {
                if (this.books.length === 0) return { totalBooks: 0, genres: [], averageRating: 0 };
                return {
                    totalBooks: this.books.length,
                    genres: this.getGenres(),
                    averageRating: (this.books.reduce((s, b) => s + b.rating, 0) / this.books.length).toFixed(1),
                };
            }
        }

        const library = new SmartLibrary();

        function populateGenreFilter() {
            const filter = document.getElementById('genreFilter');
            if (!filter) return;
            filter.innerHTML = '<option value="">Все жанры</option>';
            library.getGenres().forEach(g => {
                const opt = document.createElement('option');
                opt.value = g; opt.textContent = g;
                filter.appendChild(opt);
            });
        }

        function updateStatistics() {
            const stats = library.getStatistics();
            document.getElementById('totalBooks').textContent = stats.totalBooks;
            document.getElementById('totalGenres').textContent = stats.genres.length;
            document.getElementById('averageRating').textContent = stats.averageRating;
        }

        function displayBooks(books) {
            const container = document.getElementById('booksContainer');
            document.getElementById('resultsCount').textContent = books.length;
            if (books.length === 0) {
                container.innerHTML = '<div class="no-results">📭 Книги не найдены</div>';
                return;
            }
            container.innerHTML = books.map(book => `
                <div class="book-card">
                    ${book.image ? `<img src="${book.image}" style="width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:15px;" onerror="this.src='https://via.placeholder.com/150x200?text=No+Cover'">` : ''}
                    <div class="book-title">${escapeHtml(book.title)}</div>
                    <div class="book-author">✍️ ${escapeHtml(book.author)}</div>
                    <div class="book-meta">
                        <span class="book-genre">${escapeHtml(book.genre)}</span>
                        <span class="book-year">${book.year}</span>
                        <span class="book-rating">⭐ ${book.rating}</span>
                    </div>
                    <div class="book-description">${escapeHtml(book.description)}</div>
                    <div class="book-actions">
                        ${book.link ? `<button onclick="openReader('${book.link}')" style="background:#28a745;">📖 Читать</button>` : ''}
                        <button onclick="deleteBook(${book.id})" class="delete-btn">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function displayAllBooks() {
            const sortBy = document.getElementById('sortBy').value;
            let books = library.getAllBooks();
            if (sortBy === 'title') books = library.sortByTitle();
            else if (sortBy === 'author') books = library.sortByAuthor();
            else if (sortBy === 'year') books = library.sortByYear();
            else books = library.sortByRating();
            displayBooks(books);
        }

        function updateDisplay() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            const rating = parseFloat(document.getElementById('ratingFilter').value) || 0;
            const books = library.getAllBooks().filter(b => 
                (b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query)) &&
                (!genre || b.genre === genre) &&
                (b.rating >= rating)
            );
            displayBooks(books);
        }

        function addNewBook() {
            const t = document.getElementById('newTitle').value;
            const a = document.getElementById('newAuthor').value;
            if (!t || !a) return alert('Введите название и автора');
            library.addBook(t, a, "Manual", 2024, 5.0, "Добавлено вручную");
            updateStatistics(); updateDisplay();
        }

        function deleteBook(id) {
            if (confirm('Удалить?')) { library.removeBook(id); updateStatistics(); updateDisplay(); }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('genreFilter').value = '';
            document.getElementById('ratingFilter').value = '0';
            displayAllBooks();
        }

        function openReader(bookUrl) {
            if (typeof ePub === 'undefined') {
                alert("Ошибка: Библиотека ePub не загружена.");
                return;
            }

            const readerDiv = document.createElement('div');
            readerDiv.id = 'reader-overlay';
            readerDiv.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column;";
            readerDiv.innerHTML = `
                <div style="padding:10px; background:#667eea; color:white; display:flex; justify-content:space-between; align-items:center; z-index:10000;">
                    <button onclick="document.getElementById('reader-overlay').remove()" style="background:none; border:none; color:white; cursor:pointer; font-size:18px; font-weight:bold;">✖ Закрыть</button>
                    <span style="font-size:14px; opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px;">${bookUrl.split('/').pop()}</span>
                    <div style="width:50px"></div>
                </div>
                <div id="viewer" style="flex-grow:1; background:#ffffff; height: calc(100vh - 120px); width: 100%;"></div>
                <div style="padding:15px; text-align:center; border-top:1px solid #ddd; background:#f9f9f9; z-index:10000;">
                    <button id="prev" style="padding:10px 25px; margin-right:10px; cursor:pointer; border-radius:5px; border:1px solid #667eea; background:white;">⬅ Назад</button>
                    <button id="next" style="padding:10px 25px; cursor:pointer; border-radius:5px; background:#667eea; color:white; border:none;">Вперед ➡</button>
                </div>
            `;
            document.body.appendChild(readerDiv);

            try {
                fetch(bookUrl)
                    .then(response => {
                        if (!response.ok) throw new Error("Файл не найден");
                        return response.arrayBuffer();
                    })
                    .then(data => {
                        const book = ePub(data);
                        const rendition = book.renderTo("viewer", {
                            width: "100%",
                            height: "100%",
                            flow: "paginated",
                            manager: "default"
                        });

                        rendition.display().then(() => {
                            console.log("Успех! Текст должен быть виден.");
                            rendition.themes.default({ "body": { "color": "#000 !important" } });
                        });

                        document.getElementById("next").onclick = (e) => { e.preventDefault(); rendition.next(); };
                        document.getElementById("prev").onclick = (e) => { e.preventDefault(); rendition.prev(); };
                    })
                    .catch(err => {
                        console.error("Ошибка загрузки файла:", err);
                        document.getElementById('viewer').innerHTML = `<p style='padding:20px; color:red;'>Ошибка: Не удалось загрузить файл книги (${err.message})</p>`;
                    });
            } catch (err) {
                console.error("Критическая ошибка:", err);
            }
        } // <-- Эту скобку ты забыл в своем коде!

    </script>
</body>
</html>
