name: Auto Update Library

on:
  push:
    branches:
      - main  # или master, проверьте название вашей ветки
    paths:
      - 'books/**' # Робот просыпается только если вы добавили что-то в папку books

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install EbookLib lxml

      - name: Run update script
        run: python update_library.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add js/books_data.json img/covers/
          git commit -m "Auto-update library data" || echo "No changes to commit"
          git push
